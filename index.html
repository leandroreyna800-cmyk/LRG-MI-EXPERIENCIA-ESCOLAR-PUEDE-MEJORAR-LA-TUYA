<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Menu</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f0f2f5;
}

/* MENU PRINCIPAL */

nav{
background:#1f3a5f;
width:100%;
}

nav ul{
list-style:none;
margin:0;
padding:0;
display:flex;
justify-content:center;
}

nav ul li{
position:relative;
}

nav ul li a{
display:block;
padding:30px 40px; /* menú más ancho */
color:white;
text-decoration:none;
font-weight:bold;
font-size:18px;
}

nav ul li a:hover{
background:#2f5d8a;
}

/* SUBMENU */

nav ul li ul{
display:none;
position:absolute;
top:100%;
left:0;
background:#3d6ea3;
min-width:180px; /* submenú más ancho */
}

nav ul li ul li a{
padding:18px;
color:white;
}

nav ul li ul li a:hover{
background:#5b8cc0;
}

nav ul li:hover ul{
display:block;
}

</style>

</head>

<body>

<nav>
<ul>

<li>
<a href="#">Menu 1</a>
<ul>
<li><a href="#">Submenu1</a></li>
</ul>
</li>

<li>
<a href="#">Menu 2</a>
<ul>
<li><a href="#">Submenu2</a></li>
</ul>
</li>

<li>
<a href="#">Menu 3</a>
<ul>
<li><a href="#">Submenu3</a></li>
</ul>
</li>

<li>
<a href="#">Menu 4</a>
<ul>
<li><a href="#">Submenu4</a></li>
</ul>
</li>

<li>
<a href="#">Menu 5</a>
<ul>
<li><a href="#">Submenu5</a></li>
</ul>
</li>

<li>
<a href="#">Menu 6</a>
<ul>
<li><a href="#">Submenu6</a></li>
</ul>
</li>

</ul>
</nav>

</body>
</html>
